services:
  - type: web
    name: scheduling-optimization-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
